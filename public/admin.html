<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Indonesia Boardgame Database</title>
<meta name="robots" content="noindex, nofollow">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://wwhccyjtwbkewwlsqoth.supabase.co wss://wwhccyjtwbkewwlsqoth.supabase.co; frame-ancestors 'none'; base-uri 'self'; form-action 'none'; object-src 'none';">
<script src="vendor/tailwind.js"></script>
<script src="vendor/supabase.js"></script>
<style>
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;}
  .modal-pop{animation:pop .15s ease;}
  @keyframes pop{from{transform:scale(.97);opacity:0;}to{transform:scale(1);opacity:1;}}
</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-[#e8edf5] via-[#d6dde8] to-[#c4d0e0] text-gray-800">

<header class="text-center py-8 px-4">
  <h1 class="text-2xl sm:text-3xl font-extrabold tracking-tight">
    <span class="bg-gradient-to-r from-red-500 via-orange-400 to-yellow-400 bg-clip-text text-transparent">🛠️ Admin — Indonesia Boardgame Database</span>
  </h1>
  <p class="text-gray-500 text-sm mt-2">Halaman ini tidak dipublikasikan/ditautkan di manapun, tapi tetap dilindungi login — jangan sebar linknya sembarangan.</p>
</header>

<main class="max-w-3xl mx-auto px-4 pb-16">

  <!-- Login card -->
  <div id="loginCard" class="bg-white/70 backdrop-blur-lg rounded-2xl border border-orange-200 shadow-lg shadow-orange-500/10 p-6 max-w-sm mx-auto">
    <h2 class="font-bold text-lg mb-4">Login Admin</h2>
    <form id="loginForm" class="flex flex-col gap-3">
      <div>
        <label class="block text-xs text-gray-500 mb-1">Email</label>
        <input type="email" id="loginEmail" required class="w-full px-3 py-2 bg-gray-100 border border-gray-300 rounded-xl focus:outline-none focus:border-orange-400 focus:ring-1 focus:ring-orange-400">
      </div>
      <div>
        <label class="block text-xs text-gray-500 mb-1">Password</label>
        <input type="password" id="loginPassword" required class="w-full px-3 py-2 bg-gray-100 border border-gray-300 rounded-xl focus:outline-none focus:border-orange-400 focus:ring-1 focus:ring-orange-400">
      </div>
      <p id="loginError" class="text-xs text-red-500 hidden"></p>
      <button type="submit" class="mt-1 py-2.5 bg-gradient-to-r from-red-500 via-orange-500 to-yellow-500 text-white font-bold rounded-xl hover:from-red-400 hover:via-orange-400 hover:to-yellow-400 transition-all shadow-md shadow-orange-500/30 text-sm">Login</button>
    </form>
    <p class="text-xs text-gray-400 mt-4">Akun admin dibuat manual di Supabase Dashboard → Authentication → Users. Tidak ada pendaftaran publik di sini.</p>
  </div>

  <!-- Dashboard (setelah login) -->
  <div id="dashboard" class="hidden">
    <div class="flex items-center justify-between mb-4">
      <div class="text-sm text-gray-600">Login sebagai <b id="whoAmI" class="text-gray-800"></b></div>
      <div class="flex gap-2">
        <button id="refreshBtn" class="px-3 py-1.5 bg-gray-100 border border-gray-300 text-gray-600 rounded-lg hover:bg-gray-200 text-xs">🔄 Muat ulang</button>
        <button id="logoutBtn" class="px-3 py-1.5 bg-gray-100 border border-gray-300 text-gray-600 rounded-lg hover:bg-gray-200 text-xs">Logout</button>
      </div>
    </div>
    <div id="listStatus" class="text-sm text-gray-500 mb-3"></div>
    <div id="submissionList" class="flex flex-col gap-3"></div>
  </div>

</main>

<div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-800 text-white text-sm px-5 py-2.5 rounded-full shadow-lg z-50 opacity-0 pointer-events-none transition-opacity"></div>

<script>
/* Koneksi ke project Supabase "indonesia-boardgame-db" — harus sama persis dengan yang ada di
   index.html. Kalau suatu saat pindah/ganti project Supabase, update 2 baris ini berbarengan
   dengan index.html. */
const SUPABASE_URL = "https://wwhccyjtwbkewwlsqoth.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3aGNjeWp0d2JrZXd3bHNxb3RoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0OTM5ODMsImV4cCI6MjA5OTA2OTk4M30.pQ8zQFrP034yScF5lukLGS6Ifm876omvFnXAGdPI7L0";

if(!SUPABASE_URL || !SUPABASE_ANON_KEY){
  document.body.innerHTML = '<div class="max-w-md mx-auto mt-24 text-center text-gray-500 px-4">⚠️ SUPABASE_URL / SUPABASE_ANON_KEY belum diisi di admin.html. Lengkapi dulu sebelum memakai halaman ini.</div>';
  throw new Error('Supabase belum dikonfigurasi');
}

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>{ t.style.opacity = '0'; }, 2500);
}
function escapeHtml(str){
  return String(str==null?'':str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
/* Data usulan berasal dari submitter publik — jangan percaya skema URL-nya. Cuma izinkan http/https
   (blokir javascript:, data:, dst) SEBELUM dipasang ke href/src, biar link jahat tidak tereksekusi
   di sesi admin yang sedang login. Defense-in-depth: server juga sudah memvalidasi, tapi halaman ini
   tidak boleh bergantung pada itu saja. Kembalikan '' kalau tidak aman. */
function safeHttpUrl(u){
  if(!u) return '';
  try{
    const parsed = new URL(u, location.href);
    if(parsed.protocol==='http:' || parsed.protocol==='https:') return parsed.href;
  }catch(e){}
  return '';
}

async function getToken(){
  const { data } = await sb.auth.getSession();
  return data.session ? data.session.access_token : null;
}

async function callFn(path, options){
  const token = await getToken();
  const res = await fetch(`/.netlify/functions/${path}`, {
    ...options,
    headers: {
      'Content-Type': 'application/json',
      Authorization: `Bearer ${token}`,
      ...(options && options.headers),
    },
  });
  const data = await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.error || ('HTTP '+res.status));
  return data;
}

function typeBadge(type){
  const map = {
    add:    { label: '➕ Tambah', cls: 'bg-green-100 text-green-700' },
    edit:   { label: '✏️ Edit', cls: 'bg-blue-100 text-blue-700' },
    delete: { label: '🗑 Hapus', cls: 'bg-red-100 text-red-700' },
  };
  const m = map[type] || { label: type, cls: 'bg-gray-100 text-gray-600' };
  return `<span class="px-2.5 py-0.5 rounded-full text-xs font-semibold ${m.cls}">${m.label}</span>`;
}

function submissionCardHtml(s){
  const when = new Date(s.created_at).toLocaleString('id-ID');
  let bodyHtml = '';
  if(s.type === 'delete'){
    bodyHtml = `<div class="text-sm text-gray-600">Usulan hapus game dengan BGG ID <b>${escapeHtml(s.target_id)}</b>.</div>`;
  } else {
    const p = s.payload || {};
    // Skema URL/gambar dari submitter divalidasi di sini juga (bukan cuma di server) sebelum masuk
    // ke href/src — link non-http(s) tidak akan pernah jadi tautan yang bisa diklik admin.
    const safeUrl = safeHttpUrl(p.url);
    const safeImg = safeHttpUrl(p.image);
    bodyHtml = `
      <div class="grid grid-cols-2 gap-x-4 gap-y-1 text-sm text-gray-600">
        <div><span class="text-gray-400">ID:</span> ${escapeHtml(p.id)}</div>
        <div><span class="text-gray-400">Nama:</span> ${escapeHtml(p.name)}</div>
        <div><span class="text-gray-400">Pemain:</span> ${escapeHtml(p.minplayers)}–${escapeHtml(p.maxplayers)}</div>
        <div><span class="text-gray-400">Bobot:</span> ${escapeHtml(p.averageweight)}</div>
        <div class="col-span-2"><span class="text-gray-400">Kategori:</span> ${escapeHtml((p.categories||[]).join(', ')) || '-'}</div>
        <div class="col-span-2"><span class="text-gray-400">Mekanik:</span> ${escapeHtml((p.mechanics||[]).join(', ')) || '-'}</div>
        ${p.publisher ? `<div><span class="text-gray-400">Penerbit:</span> ${escapeHtml(p.publisher)}</div>` : ''}
        ${p.series ? `<div><span class="text-gray-400">Seri:</span> ${escapeHtml(p.series)}</div>` : ''}
        ${p.playtime ? `<div><span class="text-gray-400">Durasi:</span> ${escapeHtml(p.playtime)}</div>` : ''}
        ${p.age ? `<div><span class="text-gray-400">Usia:</span> ${escapeHtml(p.age)}</div>` : ''}
        ${p.description ? `<div class="col-span-2"><span class="text-gray-400">Deskripsi:</span> ${escapeHtml(p.description)}</div>` : ''}
        ${p.url ? `<div class="col-span-2"><span class="text-gray-400">Link:</span> ${safeUrl
            ? `<a href="${escapeHtml(safeUrl)}" target="_blank" rel="noopener" class="text-orange-500 underline">${escapeHtml(safeUrl)}</a>`
            : `<span class="text-red-500">⚠️ ${escapeHtml(p.url)} — skema tidak aman, diblokir</span>`}</div>` : ''}
        ${p.image ? `<div class="col-span-2">${safeImg
            ? `<img src="${escapeHtml(safeImg)}" alt="" class="w-20 h-28 object-contain bg-gray-100 rounded-lg border border-gray-200 mt-1">`
            : `<span class="text-red-500 text-xs">⚠️ Gambar ${escapeHtml(p.image)} — skema tidak aman, diblokir</span>`}</div>` : ''}
      </div>`;
  }
  return `
  <div class="bg-white/70 backdrop-blur-lg rounded-2xl border border-orange-200 shadow-lg shadow-orange-500/10 p-4" data-id="${s.id}">
    <div class="flex items-center justify-between mb-2">
      ${typeBadge(s.type)}
      <span class="text-xs text-gray-400">${when}</span>
    </div>
    ${bodyHtml}
    ${s.submitter_note ? `<div class="mt-2 text-xs text-gray-500 bg-gray-50 border border-gray-200 rounded-lg px-3 py-2">📝 ${escapeHtml(s.submitter_note)}</div>` : ''}
    <div class="flex gap-2 mt-3">
      <button class="approveBtn px-4 py-1.5 bg-gradient-to-r from-red-500 via-orange-500 to-yellow-500 text-white font-semibold rounded-lg text-xs shadow-sm">✅ Approve</button>
      <button class="rejectBtn px-4 py-1.5 bg-gray-100 border border-gray-300 text-gray-600 rounded-lg text-xs hover:bg-gray-200">❌ Reject</button>
    </div>
  </div>`;
}

async function loadSubmissions(){
  const statusEl = document.getElementById('listStatus');
  const listEl = document.getElementById('submissionList');
  statusEl.textContent = 'Memuat...';
  try{
    const { submissions } = await callFn('admin-list', { method: 'GET' });
    if(!submissions.length){
      statusEl.textContent = 'Tidak ada usulan yang menunggu review. 🎉';
      listEl.innerHTML = '';
      return;
    }
    statusEl.textContent = `${submissions.length} usulan menunggu review:`;
    listEl.innerHTML = submissions.map(submissionCardHtml).join('');
    listEl.querySelectorAll('[data-id]').forEach(card=>{
      const id = card.dataset.id;
      card.querySelector('.approveBtn').addEventListener('click', ()=>review(id, 'approve', card));
      card.querySelector('.rejectBtn').addEventListener('click', ()=>review(id, 'reject', card));
    });
  }catch(err){
    statusEl.textContent = 'Gagal memuat: '+err.message;
  }
}

async function review(submissionId, action, card){
  const label = action === 'approve' ? 'MENYETUJUI' : 'MENOLAK';
  if(!confirm(`Yakin ${label} usulan ini?`)) return;
  const reviewerNote = action === 'reject' ? (prompt('Catatan penolakan (opsional):') || '') : '';
  try{
    await callFn('admin-review', { method: 'POST', body: JSON.stringify({ submissionId, action, reviewerNote }) });
    toast(action === 'approve' ? 'Disetujui & sudah live' : 'Ditolak');
    card.remove();
  }catch(err){
    alert('Gagal: '+err.message);
  }
}

document.getElementById('loginForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.classList.add('hidden');
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if(error){
    errEl.textContent = error.message;
    errEl.classList.remove('hidden');
    return;
  }
  onLoggedIn(data.user);
});

document.getElementById('logoutBtn').addEventListener('click', async ()=>{
  await sb.auth.signOut();
  location.reload();
});
document.getElementById('refreshBtn').addEventListener('click', loadSubmissions);

function onLoggedIn(user){
  document.getElementById('loginCard').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');
  document.getElementById('whoAmI').textContent = user.email;
  loadSubmissions();
}

(async function initAuth(){
  const { data } = await sb.auth.getSession();
  if(data.session){
    onLoggedIn(data.session.user);
  }
})();
</script>
</body>
</html>
